<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>高一学测信息技术选择题练习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            padding: 16px;
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== 夜间模式 ===== */
        body.dark-mode {
            background: #0f0f1a;
            color: #e2e8f0;
        }

        body.dark-mode .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        body.dark-mode .header h1 {
            color: #e2e8f0;
        }

        body.dark-mode .header h1 span {
            color: #facc15;
        }

        body.dark-mode .question-card {
            background: #1e1e32;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            border-color: #2d2d4a;
        }

        body.dark-mode .question-card.correct {
            background: #0f2a1a;
            border-left-color: #2ecc71;
        }

        body.dark-mode .question-card.wrong {
            background: #2a0f0f;
            border-left-color: #ef4444;
        }

        body.dark-mode .question-card.unanswered {
            background: #2a1f0a;
            border-left-color: #f59e0b;
        }

        body.dark-mode .question-number {
            background: #2d2d5a;
            color: #818cf8;
        }

        body.dark-mode .question-text {
            color: #e2e8f0;
        }

        body.dark-mode .option-label {
            border-color: #2d2d4a;
            color: #cbd5e1;
            background: #15152a;
        }

        body.dark-mode .option-label:hover:not(.disabled) {
            border-color: #4a4a6a;
            background: #1f1f3a;
        }

        body.dark-mode .option-label .letter {
            color: #94a3b8;
        }

        body.dark-mode .option-label.correct-answer {
            border-color: #2ecc71;
            background: #0f2a1a;
        }

        body.dark-mode .option-label.correct-answer .letter {
            color: #2ecc71;
        }

        body.dark-mode .option-label.wrong-answer {
            border-color: #ef4444;
            background: #2a0f0f;
        }

        body.dark-mode .option-label.wrong-answer .letter {
            color: #ef4444;
        }

        body.dark-mode .option-label.user-selected-wrong {
            border-color: #ef4444;
            background: #2a0f0f;
        }

        body.dark-mode .option-label.show-correct {
            border-color: #2ecc71;
            background: #0f2a1a;
        }

        body.dark-mode .option-label.disabled:hover {
            border-color: #2d2d4a;
            background: #15152a;
        }

        body.dark-mode .option-label.disabled.correct-answer:hover,
        body.dark-mode .option-label.disabled.show-correct:hover {
            border-color: #2ecc71;
            background: #0f2a1a;
        }

        body.dark-mode .option-label.disabled.wrong-answer:hover,
        body.dark-mode .option-label.disabled.user-selected-wrong:hover {
            border-color: #ef4444;
            background: #2a0f0f;
        }

        body.dark-mode .result-badge.correct {
            background: #0f2a1a;
            color: #2ecc71;
        }

        body.dark-mode .result-badge.wrong {
            background: #2a0f0f;
            color: #ef4444;
        }

        body.dark-mode .result-badge.unanswered {
            background: #2a1f0a;
            color: #f59e0b;
        }

        body.dark-mode .result-badge .answer-text {
            color: #94a3b8;
        }

        body.dark-mode .progress-text {
            color: #94a3b8;
        }

        body.dark-mode .progress-text strong {
            color: #e2e8f0;
        }

        body.dark-mode .progress-bar-container {
            background: #2d2d4a;
        }

        body.dark-mode .btn-reset {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.12);
            color: #94a3b8;
        }

        body.dark-mode .btn-reset:hover {
            background: rgba(255,255,255,0.15);
            color: #e2e8f0;
        }

        body.dark-mode .score-modal {
            background: #1a1a30;
            color: #e2e8f0;
        }

        body.dark-mode .score-modal .score-label {
            color: #94a3b8;
        }

        body.dark-mode .score-modal .score-detail {
            color: #94a3b8;
        }

        body.dark-mode .score-modal .score-detail strong {
            color: #e2e8f0;
        }

        body.dark-mode .btn-close-score {
            background: #2d2d5a;
            color: #e2e8f0;
        }

        body.dark-mode .btn-close-score:hover {
            background: #3d3d6a;
        }

        body.dark-mode .btn-close-score:active {
            transform: scale(0.96);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            transition: background 0.3s ease;
        }

        .header h1 {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .header h1 span {
            color: #facc15;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .progress-text {
            color: #94a3b8;
            font-size: 13px;
            transition: color 0.3s ease;
        }

        .progress-text strong {
            color: #fff;
            transition: color 0.3s ease;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn:active {
            transform: scale(0.94);
        }

        .btn-check {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            box-shadow: 0 4px 15px rgba(46,204,113,0.3);
        }

        .btn-check:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(46,204,113,0.4);
        }

        .btn-reset {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #94a3b8;
        }

        .btn-reset:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        .btn-theme {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #94a3b8;
            font-size: 16px;
        }

        .btn-theme:hover {
            background: rgba(255,255,255,0.18);
            color: #fff;
        }

        body.dark-mode .btn-theme {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.2);
            color: #facc15;
        }

        body.dark-mode .btn-theme:hover {
            background: rgba(255,255,255,0.22);
            color: #facc15;
        }

        .btn-wrong-only {
            background: rgba(239,68,68,0.15);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.15);
        }

        .btn-wrong-only:hover {
            background: rgba(239,68,68,0.25);
            color: #fca5a5;
        }

        .btn-unanswered-only {
            background: rgba(245,158,11,0.15);
            color: #fbbf24;
            border: 1px solid rgba(245,158,11,0.15);
        }

        .btn-unanswered-only:hover {
            background: rgba(245,158,11,0.25);
            color: #fcd34d;
        }

        .btn-export {
            background: rgba(59,130,246,0.15);
            color: #60a5fa;
            border: 1px solid rgba(59,130,246,0.15);
        }

        .btn-export:hover {
            background: rgba(59,130,246,0.25);
            color: #93bbfc;
        }

        .btn-random {
            background: rgba(168,85,247,0.15);
            color: #a78bfa;
            border: 1px solid rgba(168,85,247,0.15);
        }

        .btn-random:hover {
            background: rgba(168,85,247,0.25);
            color: #c4b5fd;
        }

        .btn-back {
            background: rgba(255,255,255,0.06);
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }

        /* ===== 工具栏 ===== */
        .toolbar {
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 12px 18px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .toolbar .label {
            font-size: 13px;
            color: #94a3b8;
            margin-right: 4px;
        }

        /* ===== 计时器 ===== */
        .timer-display {
            font-size: 14px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .timer-display strong {
            color: #facc15;
            font-family: 'Courier New', monospace;
            font-size: 16px;
        }

        /* 题目卡片 */
        .question-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
            display: block;
        }

        .question-card.hidden {
            display: none;
        }

        .question-card.correct {
            border-left-color: #2ecc71;
            background: #f0fdf4;
        }

        .question-card.wrong {
            border-left-color: #ef4444;
            background: #fef2f2;
        }

        .question-card.unanswered {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }

        .question-number {
            display: inline-block;
            background: #eef2ff;
            color: #4f46e5;
            font-size: 12px;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 20px;
            margin-bottom: 10px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .question-text {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.6;
            color: #1e293b;
            margin-bottom: 12px;
            transition: color 0.3s ease;
        }

        .question-text .highlight {
            color: #2563eb;
            font-weight: 600;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 15px;
            color: #334155;
            background: #fafbfc;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .option-label:hover:not(.disabled) {
            border-color: #94a3b8;
            background: #f1f5f9;
            transform: translateX(2px);
        }

        .option-label input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #2563eb;
            cursor: pointer;
            flex-shrink: 0;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .option-label .letter {
            font-weight: 700;
            color: #64748b;
            min-width: 24px;
            transition: color 0.3s ease;
        }

        /* 批改后样式 */
        .option-label.correct-answer {
            border-color: #2ecc71;
            background: #d1fae5;
        }

        .option-label.correct-answer .letter {
            color: #059669;
        }

        .option-label.wrong-answer {
            border-color: #ef4444;
            background: #fee2e2;
        }

        .option-label.wrong-answer .letter {
            color: #dc2626;
        }

        .option-label.user-selected-wrong {
            border-color: #ef4444;
            background: #fee2e2;
        }

        .option-label.show-correct {
            border-color: #2ecc71;
            background: #d1fae5;
        }

        .option-label.disabled {
            cursor: default;
            opacity: 0.85;
        }

        .option-label.disabled:hover {
            border-color: #e2e8f0;
            background: #fafbfc;
            transform: none;
        }

        .option-label.disabled.correct-answer:hover,
        .option-label.disabled.show-correct:hover {
            border-color: #2ecc71;
            background: #d1fae5;
        }

        .option-label.disabled.wrong-answer:hover,
        .option-label.disabled.user-selected-wrong:hover {
            border-color: #ef4444;
            background: #fee2e2;
        }

        .result-badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 20px;
            margin-top: 8px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .result-badge.correct {
            background: #d1fae5;
            color: #059669;
        }

        .result-badge.wrong {
            background: #fee2e2;
            color: #dc2626;
        }

        .result-badge.unanswered {
            background: #fef3c7;
            color: #d97706;
        }

        .result-badge .answer-text {
            font-weight: 400;
            color: #64748b;
            transition: color 0.3s ease;
        }

        /* 得分弹窗 */
        .score-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }

        .score-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .score-modal {
            background: white;
            border-radius: 32px;
            padding: 40px 48px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            animation: bounceIn 0.4s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: background 0.3s ease, color 0.3s ease;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            80% {
                transform: scale(1.02);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .score-number {
            font-size: 72px;
            font-weight: 800;
            background: linear-gradient(135deg, #2ecc71, #facc15);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        .score-number.pass {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-number.fail {
            background: linear-gradient(135deg, #ef4444, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-number.perfect {
            background: linear-gradient(135deg, #facc15, #f59e0b, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: perfect-glow 1.5s ease-in-out infinite;
        }

        @keyframes perfect-glow {
            0%,
            100% {
                filter: drop-shadow(0 0 10px rgba(250, 204, 21, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 30px rgba(250, 204, 21, 0.6));
            }
        }

        .score-label {
            font-size: 18px;
            color: #64748b;
            margin-top: 8px;
            transition: color 0.3s ease;
        }

        .score-detail {
            font-size: 14px;
            color: #94a3b8;
            margin: 16px 0 24px;
            line-height: 1.8;
            transition: color 0.3s ease;
        }

        .score-detail strong {
            color: #1e293b;
            transition: color 0.3s ease;
        }

        .btn-close-score {
            background: #1e293b;
            border: none;
            padding: 12px 40px;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .btn-close-score:hover {
            background: #0f172a;
            transform: translateY(-2px);
        }

        .btn-close-score:active {
            transform: scale(0.96);
        }

        /* 进度条 */
        .progress-bar-container {
            background: #e2e8f0;
            border-radius: 20px;
            height: 6px;
            margin: 12px 0 4px;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, #2ecc71, #facc15);
            transition: width 0.5s ease;
            width: 0%;
        }

        /* ===== 统计详情 ===== */
        .stats-detail {
            display: none;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
            color: #94a3b8;
        }

        .stats-detail.show {
            display: block;
        }

        .stats-detail .row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        .stats-detail .item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stats-detail .item .num {
            font-weight: 700;
            font-size: 15px;
        }

        .stats-detail .item .num.green {
            color: #2ecc71;
        }
        .stats-detail .item .num.red {
            color: #ef4444;
        }
        .stats-detail .item .num.yellow {
            color: #f59e0b;
        }
        .stats-detail .item .num.blue {
            color: #60a5fa;
        }

        /* ===== 自定义确认弹窗 ===== */
        .custom-confirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }

        .custom-confirm-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .custom-confirm-box {
            background: white;
            border-radius: 24px;
            padding: 32px 28px 24px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            animation: bounceIn 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        body.dark-mode .custom-confirm-box {
            background: #1a1a30;
            color: #e2e8f0;
        }

        .custom-confirm-box .icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .custom-confirm-box .title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .custom-confirm-box .message {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        body.dark-mode .custom-confirm-box .message {
            color: #94a3b8;
        }

        .custom-confirm-box .btn-group {
            display: flex;
            gap: 12px;
        }

        .custom-confirm-box .btn-group .btn {
            flex: 1;
            justify-content: center;
            padding: 10px 0;
            font-size: 14px;
            border-radius: 30px;
        }

        /* ===== 移动端 ===== */
        @media (max-width: 640px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 14px 16px;
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .header h1 {
                font-size: 16px;
                text-align: center;
            }

            .header-info {
                justify-content: center;
            }

            .btn {
                padding: 6px 12px;
                font-size: 11px;
                min-height: 36px;
                min-width: 44px;
            }

            .toolbar {
                padding: 10px 12px;
                justify-content: center;
            }

            .toolbar .label {
                font-size: 11px;
            }

            .question-card {
                padding: 14px 16px;
            }

            .question-text {
                font-size: 14px;
            }

            .option-label {
                padding: 8px 12px;
                font-size: 13px;
                min-height: 44px;
            }

            .option-label input[type="radio"] {
                width: 20px;
                height: 20px;
            }

            .score-modal {
                padding: 24px 20px;
            }

            .score-number {
                font-size: 48px;
            }

            .timer-display {
                font-size: 12px;
            }

            .timer-display strong {
                font-size: 14px;
            }

            .stats-detail .row {
                gap: 10px;
            }

            .stats-detail .item {
                font-size: 12px;
            }

            .progress-text {
                font-size: 12px;
            }

            .custom-confirm-box {
                padding: 24px 20px;
            }
        }

        @media print {
            .btn-check,
            .btn-reset,
            .btn-theme,
            .btn-wrong-only,
            .btn-unanswered-only,
            .btn-export,
            .btn-random,
            .btn-back,
            .toolbar,
            .score-overlay,
            .stats-detail,
            .custom-confirm-overlay {
                display: none !important;

        <div class="message" id="confirmMessage">确定要执行此操作吗？</div>
        <div class="btn-group">

<script>
    // ==================== 自定义确认弹窗 ====================
    var confirmResolve = null;

    function customConfirm(title, message, icon) {
        return new Promise(function(resolve) {
            document.getElementById('confirmIcon').textContent = icon || '⚠️';
            document.getElementById('confirmTitle').textContent = title || '提示';
            document.getElementById('confirmMessage').textContent = message || '确定要执行此操作吗？';
            document.getElementById('customConfirm').classList.add('active');
            confirmResolve = resolve;
        });
    }

    document.getElementById('confirmOk').addEventListener('click', function() {
        document.getElementById('customConfirm').classList.remove('active');
        if (confirmResolve) {
            confirmResolve(true);
            confirmResolve = null;
        }
    });

    document.getElementById('confirmCancel').addEventListener('click', function() {
        document.getElementById('customConfirm').classList.remove('active');
        if (confirmResolve) {
            confirmResolve(false);
            confirmResolve = null;
        }
    });

    // 点击遮罩关闭（相当于取消）
    document.getElementById('customConfirm').addEventListener('click', function(e) {
        if (e.target === this) {
            this.classList.remove('active');
            if (confirmResolve) {
                confirmResolve(false);
                confirmResolve = null;
            }
        }
    });

    // ==================== 去重后的题库（共 70 道） ====================

        { id: 70, text: '设有以下程序段，循环执行次数是（ ）。i=20 while i<20: i-=1', options: ['A. 20', 'B. 0', 'C. 无限次', 'D. 1'], answer: 1 }

    // ==================== 主逻辑 ====================
    var userAnswers = new Array(questions.length).fill(null);
    var isChecked = false;
    var scoreData = null;
    var isDarkMode = false;
    var currentFilter = 'all';
    var timerSeconds = 0;
    var timerInterval = null;
    var isTimerRunning = false;

    var container = document.getElementById('questionsContainer');
    var answeredCount = document.getElementById('answeredCount');
    var totalCount = document.getElementById('totalCount');
    var progressFill = document.getElementById('progressFill');
    var timerDisplay = document.getElementById('timerDisplay');
    var checkBtn = document.getElementById('checkBtn');
    var resetBtn = document.getElementById('resetBtn');
    var themeBtn = document.getElementById('themeBtn');
    var scoreOverlay = document.getElementById('scoreOverlay');
    var scoreNumber = document.getElementById('scoreNumber');
    var scoreLabel = document.getElementById('scoreLabel');
    var scoreDetail = document.getElementById('scoreDetail');
    var closeScoreBtn = document.getElementById('closeScoreBtn');
    var statsDetail = document.getElementById('statsDetail');
    var statCorrect = document.getElementById('statCorrect');
    var statWrong = document.getElementById('statWrong');
    var statUnanswered = document.getElementById('statUnanswered');
    var statRate = document.getElementById('statRate');
    var statTime = document.getElementById('statTime');

    var filterAll = document.getElementById('filterAll');
    var filterUnanswered = document.getElementById('filterUnanswered');
    var filterWrong = document.getElementById('filterWrong');
    var filterCorrect = document.getElementById('filterCorrect');
    var wrongOnlyBtn = document.getElementById('wrongOnlyBtn');
    var unansweredOnlyBtn = document.getElementById('unansweredOnlyBtn');
    var randomBtn = document.getElementById('randomBtn');
    var exportBtn = document.getElementById('exportBtn');
    var backBtn = document.getElementById('backBtn');

    var letters = ['A', 'B', 'C', 'D'];

    // ==================== 计时器 ====================
    function startTimer() {
        if (isTimerRunning) return;
        isTimerRunning = true;
        timerInterval = setInterval(function() {
            timerSeconds++;
            updateTimerDisplay();
        }, 1000);
    }

    function stopTimer() {
        isTimerRunning = false;
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function resetTimer() {
        stopTimer();
        timerSeconds = 0;
        updateTimerDisplay();
        isTimerRunning = false;
    }

    function updateTimerDisplay() {
        var m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
        var s = String(timerSeconds % 60).padStart(2, '0');
        timerDisplay.textContent = m + ':' + s;
        if (statTime) statTime.textContent = m + ':' + s;
    }

    function getTimeString() {
        var m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
        var s = String(timerSeconds % 60).padStart(2, '0');
        return m + ':' + s;
    }

    // ==================== 夜间模式 ====================
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        document.body.classList.toggle('dark-mode', isDarkMode);
        themeBtn.innerHTML = isDarkMode ? '☀️' : '🌙';
        localStorage.setItem('examTheme', isDarkMode ? 'dark' : 'light');
    }

    function loadThemePreference() {
        var saved = localStorage.getItem('examTheme');
        if (saved === 'dark') {
            isDarkMode = true;
            document.body.classList.add('dark-mode');
            themeBtn.innerHTML = '☀️';
        } else {
            document.body.classList.remove('dark-mode');
            themeBtn.innerHTML = '🌙';
        }
    }

    // ==================== 统计更新 ====================
    function updateStats() {
        var correct = 0, wrong = 0, unanswered = 0;
        userAnswers.forEach(function(ans, idx) {
            if (ans === null) unanswered++;
            else if (ans === questions[idx].answer) correct++;
            else wrong++;
        });
        var total = questions.length;
        var rate = total > 0 ? Math.round((correct / total) * 100) : 0;

        statCorrect.textContent = correct;
        statWrong.textContent = wrong;
        statUnanswered.textContent = unanswered;
        statRate.textContent = rate + '%';
    }

    // ==================== 渲染 ====================
    function renderQuestions() {
        totalCount.textContent = questions.length;
        var html = '';
        questions.forEach(function(q, index) {
            var selected = userAnswers[index];
            var isAnswered = selected !== null;
            var show = true;
            if (currentFilter === 'unanswered' && isAnswered) show = false;
            if (currentFilter === 'wrong' && (selected === null || selected === q.answer)) show = false;
            if (currentFilter === 'correct' && (selected === null || selected !== q.answer)) show = false;

            var hiddenClass = show ? '' : 'hidden';

            html += `
                <div class="question-card ${hiddenClass}" id="qcard_${index}" data-index="${index}" data-status="${isAnswered ? (selected === q.answer ? 'correct' : 'wrong') : 'unanswered'}">
                    <div class="question-number">第 ${index + 1} 题</div>
                    <div class="question-text">${q.text}</div>
                    <div class="options" id="options_${index}">
                        ${q.options.map(function(opt, oi) {
                            return `
                            <label class="option-label" id="opt_${index}_${oi}" data-q="${index}" data-opt="${oi}">
                                <input type="radio" name="q_${index}" value="${oi}" ${selected === oi ? 'checked' : ''} ${isChecked ? 'disabled' : ''}>
                                <span class="letter">${letters[oi]}.</span>
                                <span>${opt.replace(/^[A-D]\.\s*/, '')}</span>
                            </label>
                        `}).join('')}
                    </div>
                    <div id="result_${index}"></div>
                </div>
            `;
        });
        container.innerHTML = html;

        // 使用事件委托绑定radio事件
        container.addEventListener('change', function(e) {
            var target = e.target;
            if (target && target.tagName === 'INPUT' && target.type === 'radio') {
                if (isChecked) return;
                if (!isTimerRunning && !isChecked) {
                    startTimer();
                }
                var qIndex = parseInt(target.name.replace('q_', ''));
                var value = parseInt(target.value);
                userAnswers[qIndex] = value;
                updateProgress();
                updateStats();
                var resultDiv = document.getElementById('result_' + qIndex);
                if (resultDiv) resultDiv.innerHTML = '';
                var card = document.getElementById('qcard_' + qIndex);
                if (card) {
                    card.classList.remove('correct', 'wrong', 'unanswered');
                    card.dataset.status = 'answered';
                }
                applyFilter();
            }
        });

        if (isChecked && scoreData) {
            showResults();
        }

        updateProgress();
        updateStats();
    }

    // ==================== 筛选 ====================
    function applyFilter() {
        var cards = document.querySelectorAll('.question-card');
        cards.forEach(function(card, index) {
            var selected = userAnswers[index];
            var isAnswered = selected !== null;
            var isCorrect = isAnswered && selected === questions[index].answer;
            var show = true;
            if (currentFilter === 'unanswered' && isAnswered) show = false;
            if (currentFilter === 'wrong' && (selected === null || isCorrect)) show = false;
            if (currentFilter === 'correct' && (selected === null || !isCorrect)) show = false;
            card.classList.toggle('hidden', !show);
        });

        document.querySelectorAll('[data-filter]').forEach(function(btn) {
            btn.style.background = btn.dataset.filter === currentFilter ? 'rgba(250,204,21,0.2)' : 'rgba(255,255,255,0.06)';
            btn.style.color = btn.dataset.filter === currentFilter ? '#facc15' : '#94a3b8';
        });
    }

    function setFilter(filter) {
        currentFilter = filter;
        applyFilter();
    }

    // ==================== 只看错题/未答 ====================
    function toggleWrongOnly() {
        if (currentFilter === 'wrong') {
            setFilter('all');
        } else {
            setFilter('wrong');
        }
    }

    function toggleUnansweredOnly() {
        if (currentFilter === 'unanswered') {
            setFilter('all');
        } else {
            setFilter('unanswered');
        }
    }

    // ==================== 随机抽题 ====================
    function randomQuestion() {
        if (isChecked) {
            customConfirm('⚠️ 提示', '当前已批改，随机抽题将重置答题状态，确定吗？', '⚠️').then(function(ok) {
                if (ok) {
                    resetAll();
                    doRandomJump();
                }
            });
            return;
        }
        doRandomJump();
    }

    function doRandomJump() {
        var randomIndex = Math.floor(Math.random() * questions.length);
        var card = document.getElementById('qcard_' + randomIndex);
        if (card) {
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            card.style.transition = 'box-shadow 0.3s';
            card.style.boxShadow = '0 0 0 4px rgba(250,204,21,0.4)';
            setTimeout(function() {
                card.style.boxShadow = '';
            }, 2000);
            showToast('🎲 已跳转到随机题目');
        }
    }

    // ==================== 导出错题 ====================
    function exportWrongQuestions() {
        var wrongList = [];
        questions.forEach(function(q, index) {
            var userAns = userAnswers[index];
            if (userAns !== null && userAns !== q.answer) {
                var userLetter = letters[userAns];
                var correctLetter = letters[q.answer];
                wrongList.push({
                    index: index + 1,
                    text: q.text,
                    userAnswer: userLetter,
                    correctAnswer: correctLetter,
                    options: q.options
                });
            }
        });

        if (wrongList.length === 0) {
            showToast('🎉 没有错题，太棒了！');
            return;
        }

        var content = '📝 错题集 - 信息技术学测\n';
        content += '='.repeat(40) + '\n';
        content += '生成时间: ' + new Date().toLocaleString() + '\n';
        content += '共 ' + wrongList.length + ' 道错题\n';
        content += '='.repeat(40) + '\n\n';

        wrongList.forEach(function(w, i) {
            content += '【第 ' + w.index + ' 题】 ' + w.text + '\n';
            w.options.forEach(function(opt) {
                var isUser = opt.startsWith(w.userAnswer + '.');
                var isCorrect = opt.startsWith(w.correctAnswer + '.');
                var mark = '';
                if (isUser) mark = ' ❌ (你选的)';
                if (isCorrect) mark = ' ✅ (正确答案)';
                content += '  ' + opt + mark + '\n';
            });
            content += '\n';
        });

        content += '\n' + '='.repeat(40) + '\n';
        content += '📌 加油复习，下次全对！';

        var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        var link = document.createElement('a');
        link.download = '错题集_' + new Date().toISOString().slice(0,10) + '.txt';
        link.href = URL.createObjectURL(blob);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(function() { URL.revokeObjectURL(link.href); }, 1000);

        showToast('📤 已导出 ' + wrongList.length + ' 道错题');
    }

    // ==================== Toast ====================
    function showToast(msg) {
        var existing = document.querySelector('.toast-msg-custom');
        if (existing) existing.remove();

        var t = document.createElement('div');
        t.className = 'toast-msg-custom';
        t.style.cssText = `
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            color: #fff; padding: 10px 24px; border-radius: 40px;
            font-size: 14px; font-weight: 500; z-index: 9999;
            animation: toastFade 2s forwards; max-width: 90%; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        `;
        t.textContent = msg;
        document.body.appendChild(t);

        setTimeout(function() {
            if (t.parentNode) t.remove();
        }, 2000);
    }

    // Toast动画
    var toastStyle = document.createElement('style');
    toastStyle.textContent = `
        @keyframes toastFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
    `;
    document.head.appendChild(toastStyle);

    // ==================== 进度更新 ====================
    function updateProgress() {
        var answered = userAnswers.filter(function(a) { return a !== null; }).length;
        answeredCount.textContent = answered;
        var pct = (answered / questions.length) * 100;
        progressFill.style.width = pct + '%';
    }

    function getAnswerLetter(index) {
        return letters[questions[index].answer];
    }

    // ==================== 批改 ====================
    function checkAnswers() {
        var answered = userAnswers.filter(function(a) { return a !== null; }).length;
        if (answered === 0) {
            showToast('⚠️ 请先完成答题！');
            return;
        }

        var unanswered = questions.length - answered;
        if (unanswered > 0) {
            customConfirm('⚠️ 提示', '你还有 ' + unanswered + ' 题未作答，确定要提交批改吗？', '⚠️').then(function(ok) {
                if (ok) {
                    doCheck();
                }
            });
            return;
        }
        doCheck();
    }

    function doCheck() {
        stopTimer();
        isChecked = true;
        scoreData = calculateScore();
        showResults();
        showScoreModal();
        updateStats();
    }

    function calculateScore() {
        var correct = 0;
        var wrong = 0;
        var unanswered = 0;

        questions.forEach(function(q, index) {
            var userAns = userAnswers[index];
            if (userAns === null) {
                unanswered++;
            } else if (userAns === q.answer) {
                correct++;
            } else {
                wrong++;
            }
        });

        return { correct: correct, wrong: wrong, unanswered: unanswered, total: questions.length };
    }

    function showResults() {
        var data = scoreData || calculateScore();

        questions.forEach(function(q, index) {
            var userAns = userAnswers[index];
            var isCorrect = userAns === q.answer;
            var card = document.getElementById('qcard_' + index);
            var resultDiv = document.getElementById('result_' + index);

            if (!card || !resultDiv) return;

            card.classList.remove('correct', 'wrong', 'unanswered');

            document.querySelectorAll('#options_' + index + ' .option-label').forEach(function(label) {
                var optIndex = parseInt(label.dataset.opt);
                label.classList.remove('correct-answer', 'wrong-answer', 'user-selected-wrong', 'show-correct', 'disabled');
                var radio = label.querySelector('input[type="radio"]');
                if (radio) radio.disabled = true;

                if (optIndex === q.answer) {
                    label.classList.add('correct-answer');
                }
                if (userAns !== null && optIndex === userAns && userAns !== q.answer) {
                    label.classList.add('user-selected-wrong');
                }
                label.classList.add('disabled');
            });

            if (userAns === null) {
                card.classList.add('unanswered');
                card.dataset.status = 'unanswered';
                resultDiv.innerHTML =
                    '<span class="result-badge unanswered">⏳ 未作答 <span class="answer-text">(正确答案: ' + getAnswerLetter(index) + ')</span></span>';
            } else if (isCorrect) {
                card.classList.add('correct');
                card.dataset.status = 'correct';
                resultDiv.innerHTML = '<span class="result-badge correct">✅ 正确</span>';
            } else {
                card.classList.add('wrong');
                card.dataset.status = 'wrong';
                resultDiv.innerHTML =
                    '<span class="result-badge wrong">❌ 错误 <span class="answer-text">(正确答案: ' + getAnswerLetter(index) + ')</span></span>';
            }
        });

        document.querySelectorAll('input[type="radio"]').forEach(function(input) {
            input.disabled = true;
        });

        applyFilter();
    }

    function showScoreModal() {
        var data = scoreData || calculateScore();
        var pct = Math.round((data.correct / data.total) * 100);

        scoreNumber.textContent = pct + '%';

        if (pct === 100) {
            scoreNumber.className = 'score-number perfect';
            scoreLabel.textContent = '🏆 完美通关！';
        } else if (pct >= 80) {
            scoreNumber.className = 'score-number pass';
            scoreLabel.textContent = '🎉 优秀！继续加油！';
        } else if (pct >= 60) {
            scoreNumber.className = 'score-number pass';
            scoreLabel.textContent = '✅ 及格了，再接再厉！';
        } else if (pct >= 30) {
            scoreNumber.className = 'score-number fail';
            scoreLabel.textContent = '📚 需要多复习哦！';
        } else {
            scoreNumber.className = 'score-number fail';
            scoreLabel.textContent = '😅 别灰心，再来一次！';
        }

        scoreDetail.innerHTML = `
            正确 <strong style="color:#2ecc71;">${data.correct}</strong> 题，
            错误 <strong style="color:#ef4444;">${data.wrong}</strong> 题，
            未答 <strong style="color:#f59e0b;">${data.unanswered}</strong> 题
            <br>共 ${data.total} 题 · 用时 ${getTimeString()}
        `;

        statsDetail.classList.add('show');
        updateStats();
        statTime.textContent = getTimeString();

        scoreOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    // ==================== 重置 ====================
    function resetAll() {
        userAnswers = new Array(questions.length).fill(null);
        isChecked = false;
        scoreData = null;
        resetTimer();
        statsDetail.classList.remove('show');
        renderQuestions();
        updateProgress();
        updateStats();
        scoreOverlay.classList.remove('active');
        document.body.style.overflow = '';
        setFilter('all');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        showToast('🔄 已重置，重新答题吧！');
    }

    // ==================== 返回首页 ====================
    function goBack() {
        if (document.referrer && document.referrer.includes(window.location.hostname)) {
            window.history.back();
        } else {
            window.location.href = 'index.html';
        }
    }

    // ==================== 绑定事件 ====================
    // 使用 addEventListener 同时支持 click 和 touch（iOS 兼容）
    function addButtonEvent(el, handler) {
        if (!el) return;
        el.addEventListener('click', handler);
        el.addEventListener('touchstart', function(e) {
            // 防止 iOS 上的双击缩放干扰
        }, { passive: true });
    }

    addButtonEvent(checkBtn, checkAnswers);
    addButtonEvent(resetBtn, resetAll);
    addButtonEvent(themeBtn, toggleTheme);
    addButtonEvent(closeScoreBtn, function() {
        scoreOverlay.classList.remove('active');
        document.body.style.overflow = '';
        var firstWrong = document.querySelector('.question-card.wrong');
        if (firstWrong) {
            firstWrong.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    });

    // 筛选
    addButtonEvent(filterAll, function() { setFilter('all'); });
    addButtonEvent(filterUnanswered, function() { setFilter('unanswered'); });
    addButtonEvent(filterWrong, function() { setFilter('wrong'); });
    addButtonEvent(filterCorrect, function() { setFilter('correct'); });
    addButtonEvent(wrongOnlyBtn, toggleWrongOnly);
    addButtonEvent(unansweredOnlyBtn, toggleUnansweredOnly);
    addButtonEvent(randomBtn, randomQuestion);
    addButtonEvent(exportBtn, exportWrongQuestions);
    addButtonEvent(backBtn, goBack);

    // 点击遮罩关闭得分弹窗
    scoreOverlay.addEventListener('click', function(e) {
        if (e.target === scoreOverlay) {
            scoreOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }
    });

    // ==================== 键盘快捷键 ====================
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.metaKey) {
            var active = document.activeElement;
            if (active && active.tagName === 'INPUT' && active.type === 'radio') return;
            if (!scoreOverlay.classList.contains('active')) {
                checkBtn.click();
            }
        }
        if (e.key === 'r' && !e.ctrlKey && !e.metaKey) {
            resetBtn.click();
        }
        if (e.key === 't' && !e.ctrlKey && !e.metaKey) {
            themeBtn.click();
        }
        if (e.key === 'w' && !e.ctrlKey && !e.metaKey) {
            toggleWrongOnly();
        }
        if (e.key === 'u' && !e.ctrlKey && !e.metaKey) {
            toggleUnansweredOnly();
        }
        if (e.key === 'a' && !e.ctrlKey && !e.metaKey) {
            setFilter('all');
        }
        if (e.key === 'Escape' && scoreOverlay.classList.contains('active')) {
            scoreOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }
    });

    // ==================== 初始化 ====================
    loadThemePreference();
    renderQuestions();
    resetTimer();

    console.log('📝 信息技术练习系统已加载 (iOS兼容版)');
    console.log('📚 共 ' + questions.length + ' 道选择题');
</script>
</body>
</html>
