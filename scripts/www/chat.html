        }

            left: 0;
            right: 0;

            flex-direction: column;
            position: relative;

        }

        .header {
            background: #ffffff;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 0.5px solid #e5e5e5;
            flex-shrink: 0;
        }
        .header .back {
            font-size: 24px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;

        .header .back:active { background: #e5e5e5; }
        .header .title { font-size: 17px; font-weight: 600; }

            text-align: center;

            overflow-y: auto;
            background: #f5f5f5;
            -webkit-overflow-scrolling: touch;
        }
        .page.hidden { display: none; }

            background: #f2f2f2;

        .chat-name { font-size: 17px; font-weight: 500; margin-bottom: 4px; }

            flex-direction: column;
            height: 100%;

        .chat-header-info {

            align-items: center;
            gap: 12px;

            flex-shrink: 0;
        }
        .detail-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f2f2f2;

        .detail-name { font-size: 18px; font-weight: 600; }
        .detail-status { font-size: 12px; color: #8e8e93; }

        .chat-messages-area {

            overflow-y: auto;

            flex-direction: column;
            gap: 12px;
            background: #f5f5f5;
            -webkit-overflow-scrolling: touch;

        .message { display: flex; max-width: 85%; }
        .message-left { align-self: flex-start; }
        .message-right { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 8px;
            flex-shrink: 0;
            overflow: hidden;
            background: #07c16020;
        }
        .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .msg-bubble {

            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;

            text-decoration: underline;

        .msg-time { font-size: 10px; color: #b2b2b2; margin-top: 4px; }

        .msg-bubble .review-link {

            padding: 8px 18px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            margin-top: 4px;

            box-shadow: 0 4px 15px rgba(102,126,234,0.3);

        .msg-bubble .review-link:active {

        }

            text-decoration: none;
            font-weight: 600;
            font-size: 14px;

        }

        }

        function showConfirm(title, msg) {
            return new Promise((resolve) => {
                modalTitle.innerText = title;
                modalMessage.innerText = msg;
                modal.classList.add('active');
                const onConfirm = () => { modal.classList.remove('active'); modalConfirm.removeEventListener('click', onConfirm); modalCancel.removeEventListener('click', onCancel); resolve(true); };
                const onCancel = () => { modal.classList.remove('active'); modalConfirm.removeEventListener('click', onConfirm); modalCancel.removeEventListener('click', onCancel); resolve(false); };
                modalConfirm.addEventListener('click', onConfirm, { once: true });
                modalCancel.addEventListener('click', onCancel, { once: true });
            });
        }
        
        function showToast(msg) {
            let t = document.createElement('div'); t.className = 'toast-msg'; t.innerText = msg;
            document.body.appendChild(t); setTimeout(() => t.remove(), 2000);
        }
        
        function getCurrentTime() {
            const d = new Date();
            return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        }
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
        
        function fetchBalanceFromMoyu() {
            try { let raw = localStorage.getItem(STORAGE_KEY_ASSETS); if (raw && !isNaN(parseFloat(raw))) return parseFloat(raw); return 1000; } catch(e) { return 1000; }
        }
        function syncBalanceToMoyu(newBalance) { localStorage.setItem(STORAGE_KEY_ASSETS, newBalance); }
        function updateBalanceUI() {

        }
        window.addEventListener('storage', () => updateBalanceUI());
        setInterval(updateBalanceUI, 4000);
        
        function loadTransferRecords() {
            const saved = localStorage.getItem(STORAGE_KEY_TRANSFER);

            recordsModal.classList.add('active');
        }
        
        function saveChatHistory() { localStorage.setItem("wechat_multi_chat_history", JSON.stringify(chatHistoryMap)); }
        function loadChatHistory() {
            const saved = localStorage.getItem("wechat_multi_chat_history");

            characters.forEach(c => {

                    chatHistoryMap[c.id] = [];

            });
            saveChatHistory();
            renderChatList();
        }
        
        function renderChatList() {
            if (!chatListContainer) return;
            chatListContainer.innerHTML = characters.map(char => {
                const history = chatHistoryMap[char.id] || [];

                const preview = lastMsg ? (lastMsg.content.length > 20 ? lastMsg.content.slice(0,20)+'...' : lastMsg.content) : '暂无消息';
                const avatarHtml = char.avatarType === 'image' ? `<img src="${char.avatar}" onerror="this.src=''">` : `<span class="emoji-avatar">${char.avatar}</span>`;
                return `<div class="chat-item" data-id="${char.id}"><div class="chat-avatar">${avatarHtml}</div><div class="chat-info"><div class="chat-name">${char.name}</div><div class="chat-preview">${escapeHtml(preview)}</div></div><div class="chat-time">${lastMsg?.time || ''}</div></div>`;
            }).join('');
            document.querySelectorAll('.chat-item').forEach(el => {
                el.addEventListener('click', () => {
                    const char = characters.find(c => c.id === el.dataset.id);
                    if (char) openChatDetail(char);
                });
            });
        }
        
        function openChatDetail(character) {
            currentCharacter = character;
            renderChatDetailMessages();
            chatListPage.classList.add('hidden');
            chatDetailPage.classList.remove('hidden');
            profilePage.classList.add('hidden');
            headerTitle.innerText = character.name;
            bottomTabBar.style.display = 'none';
            chatMoreMenu.classList.remove('active');
        }
        
        function renderChatDetailMessages() {
            if (!currentCharacter) return;

                    html += `<div style="text-align:center; margin:8px 0;"><span style="background:#e5e5e5; padding:4px 12px; border-radius:20px; font-size:11px;">${escapeHtml(msg.content)}</span></div>`;
                } else if (msg.isTransfer) {
                    const isSelf = msg.sender === '我';
                    const bubbleClass = isSelf ? 'message-right' : 'message-left';
                    const prefix = isSelf ? '你向对方转账' : `${currentCharacter.name} 向你转账`;
                    html += `<div class="message ${bubbleClass}"><div class="msg-avatar">${isSelf ? '🐟' : (currentCharacter.avatarType === 'image' ? `<img src="${currentCharacter.avatar}">` : `<span>${currentCharacter.avatar}</span>`)}</div><div><div class="msg-bubble transfer-bubble"><div class="transfer-badge">💰 转账</div><div>${prefix} ¥${msg.amount.toFixed(2)}<br>${msg.remark || ''}</div></div><div class="msg-time">${msg.time}</div></div></div>`;

                    html += `<div class="message message-left"><div class="msg-avatar">${msgAvatarHtml}</div><div><div class="msg-bubble">${msg.content}</div><div class="msg-time">${msg.time}</div></div></div>`;

                }
            });
            chatMessagesArea.innerHTML = html;
            chatMessagesArea.scrollTop = chatMessagesArea.scrollHeight;
        }
        
        function addMessageToCurrentChat(content, isUser = true, isAI = false, isTransfer = false, amount = null, remark = null) {

                isAI, isTransfer, amount, remark

            saveChatHistory();
            renderChatDetailMessages();
        }

        function showTypingIndicator() {

        }
        function hideTypingIndicator() { const el = document.getElementById('typing-indicator'); if(el) el.remove(); }

                const reply = await callZhipuAI(content, currentCharacter);
                hideTypingIndicator();
                // 检测是否包含HTML链接
                if (reply.includes('<a href=')) {
                    chatHistoryMap[currentCharacter.id].push({
                        id: Date.now(), sender: currentCharacter.name, avatar: currentCharacter.avatar,
                        avatarType: currentCharacter.avatarType, content: reply, time: getCurrentTime(),
                        isAI: true, isTransfer: false, isHTML: true
                    });
                    saveChatHistory();
                    renderChatDetailMessages();
                } else {
                    addMessageToCurrentChat(reply, false, true);
                }
            } catch(e) { hideTypingIndicator(); showToast("AI回复失败"); }
            isLoadingAI = false;
        }
        
        async function resetCurrentChat() {
            if (!currentCharacter) return;

            saveChatHistory();
            renderChatDetailMessages();
            showToast(`已清空与「${currentCharacter.name}」的聊天记录`);

        function openTransferPopup() { if (!currentCharacter) return; transferTargetNameSpan.innerText = currentCharacter.name; popupAmount.value = ''; popupRemark.value = '恭喜发财，大吉大利'; updateBalanceUI(); transferPopup.classList.add('open'); transferBgOverlay.classList.add('active'); }
        function closeTransferPopupFunc() { transferPopup.classList.remove('open'); transferBgOverlay.classList.remove('active'); }
        
        async function executeTransfer() {
            if (!currentCharacter) return;
            let amount = parseFloat(popupAmount.value);
            if (isNaN(amount) || amount <= 0) { showToast("请输入有效金额"); return; }
            amount = Math.round(amount * 100) / 100;
            if (userBalance < amount) {
                const ok = await showConfirm("余额不足", `当前零钱 ¥${userBalance.toFixed(2)}，需要去摸鱼商超充值吗？`);
                if (ok) { closeTransferPopupFunc(); switchToProfile(); }
                return;

            if (!confirmOk) return;
            const newBalance = userBalance - amount;

            syncBalanceToMoyu(userBalance);

            addMessageToCurrentChat(`💰 你向 ${currentCharacter.name} 转账 ¥${amount.toFixed(2)} ${remark ? '('+remark+')' : ''}`, true, false, true, amount, remark);

                }
            }, 500);
            showToast(`✓ 转账成功 ¥${amount.toFixed(2)}`);
            closeTransferPopupFunc();
        }
        
        function switchToChatList() {

            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));

            chatMoreMenu.classList.remove('active');
        }
        
        function switchToProfile() {
            chatListPage.classList.add('hidden');
            chatDetailPage.classList.add('hidden');
            profilePage.classList.remove('hidden');
            headerTitle.innerText = '我的';
            bottomTabBar.style.display = 'flex';

            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));

            chatMoreMenu.classList.remove('active');

        function toggleMoreMenu() { chatMoreMenu.classList.toggle('active'); }

        globalBackBtn.addEventListener('click', async () => {
            chatMoreMenu.classList.remove('active');
            if (!chatDetailPage.classList.contains('hidden')) switchToChatList();
            else if (!profilePage.classList.contains('hidden')) switchToChatList();
            else { const ok = await showConfirm("返回", "返回摸鱼商超？"); if(ok) window.location.href = "moyu.html"; }
        });
        
        detailSendBtn.addEventListener('click', () => { const val = detailMessageInput.value.trim(); if(val) { sendUserMessage(val); detailMessageInput.value = ""; } });
        detailMessageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') { e.preventDefault(); detailSendBtn.click(); } });
        openTransferInChatBtn.addEventListener('click', openTransferPopup);
        closeTransferPopup.addEventListener('click', closeTransferPopupFunc);
        transferBgOverlay.addEventListener('click', closeTransferPopupFunc);
        confirmTransferBtn.addEventListener('click', executeTransfer);
        showBalanceMenuItem.addEventListener('click', () => showToast(`当前零钱: ¥${userBalance.toFixed(2)}`));
        showRecordsMenuItem.addEventListener('click', showTransferRecords);
        syncAssetsMenuItem.addEventListener('click', () => { updateBalanceUI(); showToast("已同步摸鱼商超余额"); });

        closeRecordsBtn.addEventListener('click', () => recordsModal.classList.remove('active'));

        chatMoreBtn.addEventListener('click', (e) => { e.stopPropagation(); if (!chatDetailPage.classList.contains('hidden')) toggleMoreMenu(); });

        document.querySelectorAll('.tab-item').forEach(item => {
            item.addEventListener('click', () => { if (item.dataset.tab === 'chatList') switchToChatList(); else if (item.dataset.tab === 'profile') switchToProfile(); });

        updateBalanceUI();
        loadChatHistory();
        loadTransferRecords();
        switchToChatList();
    })();
