<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>登录 · 摸鱼商超</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #0B1622 0%, #0F212F 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 420px;
            width: 100%;
            background: rgba(15, 25, 45, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px 32px;
            border: 1px solid rgba(46, 204, 113, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo .icon {
            font-size: 52px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FACC15, #2ECC71);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 8px;
        }

        .logo p {
            color: #94A3B8;
            font-size: 14px;
            margin-top: 4px;
        }

        .tab {
            display: flex;
            gap: 8px;
            background: #0F172A;
            border-radius: 40px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 36px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            color: #94A3B8;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #2ECC71, #27AE60);
            color: white;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #94A3B8;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: #020617;
            border: 1px solid #2D3A5E;
            border-radius: 40px;
            color: #E2E8F0;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #2ECC71;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.1);
        }

        .form-group input::placeholder {
            color: #475569;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(95deg, #2ECC71, #27AE60);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-submit:active {
            transform: scale(0.97);
        }

        .btn-submit:hover {
            box-shadow: 0 4px 20px rgba(46, 204, 113, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-msg {
            color: #EF4444;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            text-align: center;
        }

        .success-msg {
            color: #2ECC71;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            text-align: center;
        }

        .footer {
            text-align: center;
            color: #475569;
            font-size: 12px;
            margin-top: 20px;
        }

        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 18px 0 16px;
            color: #475569;
            font-size: 12px;
            gap: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2D3A5E;
        }

        .btn-quick-view {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            color: #94A3B8;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-quick-view:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #E2E8F0;
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-quick-view:active {
            transform: scale(0.97);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            color: #fff;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            border: 1px solid rgba(255,255,255,0.06);
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            border-color: rgba(239,68,68,0.3);
        }

        .toast.success {
            border-color: rgba(46,204,113,0.3);
        }

        .saved-hint {
            color: #2ECC71;
            font-size: 12px;
            text-align: center;
            margin-top: 6px;
            display: none;
        }

        .saved-hint.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 28px 20px;
                border-radius: 32px;
            }
            .logo h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">
        <span class="icon">🐟</span>
        <h1>摸鱼商超</h1>
        <p>登录开启摸鱼之旅</p>
    </div>

    <div class="tab">
        <button class="tab-btn active" data-tab="login">登录</button>
        <button class="tab-btn" data-tab="register">注册</button>
    </div>

    <!-- 登录表单 -->
    <div class="form-panel active" id="loginPanel">
        <div class="form-group">
            <label>👤 用户名</label>
            <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="username">
        </div>
        <div class="form-group">
            <label>🔒 密码</label>
            <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <button class="btn-submit" id="loginBtn">登录</button>
        <div class="saved-hint" id="savedHint">💾 已保存账号，点击登录即可</div>
        <div class="error-msg" id="loginError">用户名或密码错误</div>
        <div class="success-msg" id="loginSuccess">登录成功，正在跳转...</div>
    </div>

    <!-- 注册表单 -->
    <div class="form-panel" id="registerPanel">
        <div class="form-group">
            <label>👤 用户名</label>
            <input type="text" id="regUsername" placeholder="请输入用户名（2-16位）" autocomplete="new-username">
        </div>
        <div class="form-group">
            <label>📛 昵称</label>
            <input type="text" id="regNickname" placeholder="请输入昵称（选填）" autocomplete="new-username">
        </div>
        <div class="form-group">
            <label>🔒 密码</label>
            <input type="password" id="regPassword" placeholder="请输入密码（至少4位）" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label>🔒 确认密码</label>
            <input type="password" id="regConfirmPassword" placeholder="请再次输入密码" autocomplete="new-password">
        </div>
        <button class="btn-submit" id="registerBtn">注册</button>
        <div class="error-msg" id="regError">注册失败，请检查输入</div>
        <div class="success-msg" id="regSuccess">注册成功，请登录</div>
    </div>

    <!-- 分隔线 -->
    <div class="divider">或</div>

    <!-- 简单看看按钮（无需注册） -->
    <button class="btn-quick-view" id="quickViewBtn">👀 简单看看（无需注册）</button>

    <div class="footer">
        🎮 摸鱼商超 · 仅供娱乐
    </div>
</div>

<!-- Toast 提示 -->
<div class="toast" id="toast"></div>

<script>
    (function() {
        // ==================== 配置 ====================
        const REDIRECT_URL = 'moyu.html';
        const QUICK_VIEW_URL = 'moyu2.html';
        const REGISTERED_USERS_KEY = 'moyu_registered_users';

        // 预置测试账号（不可修改）
        const TEST_USERS = {
            'moyu': { password: '123456', nickname: '摸鱼仙人', avatar: '🐟' },
            'xiao_miao': { password: '123456', nickname: '林小喵', avatar: '🐱' },
            'wang_cai': { password: '123456', nickname: '王财主', avatar: '💰' },
            'li_gou': { password: '123456', nickname: '李狗蛋', avatar: '🐶' },
            'hua_jie': { password: '123456', nickname: '花姐', avatar: '🌸' },
            'bohe': { password: '123456', nickname: '薄荷', avatar: '🌿' }
        };

        // 注册用户存储（从 localStorage 加载）
        let registeredUsers = {};

        // ==================== 加载/保存注册用户 ====================
        function loadRegisteredUsers() {
            try {
                const saved = localStorage.getItem(REGISTERED_USERS_KEY);
                if (saved) {
                    registeredUsers = JSON.parse(saved);
                } else {
                    registeredUsers = {};
                }
            } catch (e) {
                registeredUsers = {};
            }
        }

        function saveRegisteredUsers() {
            try {
                localStorage.setItem(REGISTERED_USERS_KEY, JSON.stringify(registeredUsers));
            } catch (e) {}
        }

        // DOM 元素
        const loginPanel = document.getElementById('loginPanel');
        const registerPanel = document.getElementById('registerPanel');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const quickViewBtn = document.getElementById('quickViewBtn');
        const loginUsername = document.getElementById('loginUsername');
        const loginPassword = document.getElementById('loginPassword');
        const regUsername = document.getElementById('regUsername');
        const regNickname = document.getElementById('regNickname');
        const regPassword = document.getElementById('regPassword');
        const regConfirmPassword = document.getElementById('regConfirmPassword');
        const loginError = document.getElementById('loginError');
        const loginSuccess = document.getElementById('loginSuccess');
        const regError = document.getElementById('regError');
        const regSuccess = document.getElementById('regSuccess');
        const savedHint = document.getElementById('savedHint');
        const toast = document.getElementById('toast');

        let toastTimer = null;

        // ==================== 加载保存的登录数据 ====================
        function loadSavedLogin() {
            try {
                const saved = localStorage.getItem('moyu_saved_login');
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.username && data.password) {
                        loginUsername.value = data.username;
                        loginPassword.value = data.password;
                        savedHint.textContent = `💾 已保存账号: ${data.username}，点击登录即可`;
                        savedHint.classList.add('show');
                        return true;
                    }
                }
            } catch (e) {}
            return false;
        }

        // ==================== 保存登录数据 ====================
        function saveLoginData(username, password) {
            try {
                localStorage.setItem('moyu_saved_login', JSON.stringify({
                    username: username,
                    password: password,
                    savedAt: Date.now()
                }));
            } catch (e) {}
        }

        // ==================== Toast ====================
        function showToast(msg, type = 'info') {
            if (toastTimer) {
                clearTimeout(toastTimer);
                toast.classList.remove('show');
            }
            void toast.offsetWidth;
            toast.textContent = msg;
            toast.className = 'toast';
            if (type === 'error') toast.classList.add('error');
            if (type === 'success') toast.classList.add('success');
            toast.classList.add('show');
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
                toastTimer = null;
            }, 2500);
        }

        // ==================== 用户验证 ====================
        function findUser(username) {
            // 先检查测试账号
            if (TEST_USERS[username]) {
                return {
                    username: username,
                    password: TEST_USERS[username].password,
                    nickname: TEST_USERS[username].nickname,
                    avatar: TEST_USERS[username].avatar,
                    is_test: true
                };
            }
            // 再检查注册用户
            if (registeredUsers[username]) {
                return {
                    username: username,
                    password: registeredUsers[username].password,
                    nickname: registeredUsers[username].nickname,
                    avatar: registeredUsers[username].avatar || '🐟',
                    is_test: false
                };
            }
            return null;
        }

        function loginUser(username, password) {
            const user = findUser(username);
            if (!user) {
                return { success: false, error: '用户名不存在' };
            }
            if (user.password !== password) {
                return { success: false, error: '密码错误' };
            }
            return { success: true, user: user };
        }

        function registerUser(username, password, nickname) {
            // 检查是否与测试账号冲突
            if (TEST_USERS[username]) {
                return { success: false, error: '用户名已被占用（系统账号）' };
            }
            // 检查是否已被注册
            if (registeredUsers[username]) {
                return { success: false, error: '用户名已被注册' };
            }
            // 保存注册用户
            registeredUsers[username] = {
                password: password,
                nickname: nickname || username,
                avatar: ['🐟', '🐱', '🐶', '🦊', '🐼', '🐨', '🐸', '🐙', '🦄', '🌟'][Math.floor(Math.random() * 10)]
            };
            saveRegisteredUsers();
            return { success: true };
        }

        // ==================== 登录跳转 ====================
        function redirectToMain(user) {
            localStorage.setItem('moyu_current_user', JSON.stringify(user));
            localStorage.setItem('assets', '1000');
            localStorage.setItem('moyu_user_login', Date.now().toString());
            showToast('✅ 登录成功，欢迎回来！', 'success');
            setTimeout(() => {
                window.location.href = REDIRECT_URL;
            }, 600);
        }

        // ==================== 切换 Tab ====================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tab = this.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
                if (tab === 'login') {
                    loginPanel.classList.add('active');
                    loginError.style.display = 'none';
                    loginSuccess.style.display = 'none';
                } else {
                    registerPanel.classList.add('active');
                    regError.style.display = 'none';
                    regSuccess.style.display = 'none';
                }
            });
        });

        // ==================== 登录 ====================
        loginBtn.addEventListener('click', function() {
            const username = loginUsername.value.trim();
            const password = loginPassword.value.trim();

            if (!username || !password) {
                loginError.textContent = '请填写用户名和密码';
                loginError.style.display = 'block';
                loginSuccess.style.display = 'none';
                return;
            }

            loginError.style.display = 'none';
            loginSuccess.style.display = 'none';
            this.disabled = true;
            this.textContent = '登录中...';

            setTimeout(() => {
                const result = loginUser(username, password);
                if (result.success) {
                    // 保存登录数据
                    saveLoginData(username, password);
                    loginSuccess.textContent = '✅ 登录成功，正在跳转...';
                    loginSuccess.style.display = 'block';
                    redirectToMain(result.user);
                } else {
                    loginError.textContent = '❌ ' + result.error;
                    loginError.style.display = 'block';
                    this.disabled = false;
                    this.textContent = '登录';
                    showToast('❌ ' + result.error, 'error');
                }
            }, 400);
        });

        loginPassword.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loginBtn.click();
        });
        loginUsername.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loginBtn.click();
        });

        // ==================== 注册 ====================
        registerBtn.addEventListener('click', function() {
            const username = regUsername.value.trim();
            const nickname = regNickname.value.trim() || username;
            const password = regPassword.value;
            const confirm = regConfirmPassword.value;

            if (!username || username.length < 2 || username.length > 16) {
                regError.textContent = '❌ 用户名长度应为 2-16 位';
                regError.style.display = 'block';
                regSuccess.style.display = 'none';
                showToast('❌ 用户名长度应为 2-16 位', 'error');
                return;
            }
            if (!/^[a-zA-Z0-9\u4e00-\u9fa5_]+$/.test(username)) {
                regError.textContent = '❌ 用户名只能包含字母、数字、中文和下划线';
                regError.style.display = 'block';
                regSuccess.style.display = 'none';
                showToast('❌ 用户名只能包含字母、数字、中文和下划线', 'error');
                return;
            }
            if (password.length < 4) {
                regError.textContent = '❌ 密码至少 4 位';
                regError.style.display = 'block';
                regSuccess.style.display = 'none';
                showToast('❌ 密码至少 4 位', 'error');
                return;
            }
            if (password !== confirm) {
                regError.textContent = '❌ 两次密码输入不一致';
                regError.style.display = 'block';
                regSuccess.style.display = 'none';
                showToast('❌ 两次密码输入不一致', 'error');
                return;
            }

            regError.style.display = 'none';
            regSuccess.style.display = 'none';
            this.disabled = true;
            this.textContent = '注册中...';

            setTimeout(() => {
                const result = registerUser(username, password, nickname);
                if (result.success) {
                    regSuccess.textContent = '✅ 注册成功！请切换到登录页登录';
                    regSuccess.style.display = 'block';
                    showToast('✅ 注册成功！请登录', 'success');
                    this.disabled = false;
                    this.textContent = '注册';
                    regUsername.value = '';
                    regNickname.value = '';
                    regPassword.value = '';
                    regConfirmPassword.value = '';
                    setTimeout(() => {
                        document.querySelector('[data-tab="login"]').click();
                        loginUsername.value = username;
                    }, 500);
                } else {
                    regError.textContent = '❌ ' + result.error;
                    regError.style.display = 'block';
                    this.disabled = false;
                    this.textContent = '注册';
                    showToast('❌ ' + result.error, 'error');
                }
            }, 400);
        });

        regConfirmPassword.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') registerBtn.click();
        });
        regPassword.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                regConfirmPassword.focus();
            }
        });

        // ==================== 简单看看 ====================
        quickViewBtn.addEventListener('click', function() {
            showToast('👀 正在进入预览模式...', 'success');
            setTimeout(() => {
                window.location.href = QUICK_VIEW_URL;
            }, 400);
        });

        // ==================== 初始化 ====================
        // 加载注册用户数据
        loadRegisteredUsers();
        // 加载保存的登录数据
        loadSavedLogin();

        // 控制台提示
        console.log('🐟 摸鱼商超登录页面');
        console.log('📝 测试账号:');
        console.log('   moyu / 123456');
        console.log('   xiao_miao / 123456');
        console.log('   wang_cai / 123456');
        console.log('   li_gou / 123456');
        console.log('   hua_jie / 123456');
        console.log('   bohe / 123456');
        console.log('👀 或点击"简单看看"直接预览');
        console.log('💾 注册用户数据已持久化保存到 localStorage');
        console.log('ℹ️ 需要手动点击登录按钮进入');
    })();
</script>
</body>
</html>
